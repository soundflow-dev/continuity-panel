name: Validate installer kit

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate shell syntax
        run: bash -n install.sh "Install ContinuityPanel.command" bin/*
      - name: Validate launchd template
        run: plutil -lint config/dev.continuitypanel.mission-control.plist.template
      - name: Validate Mission Control integration patch
        run: |
          git clone --depth 1 --branch v2.1.0 https://github.com/builderz-labs/mission-control.git "$RUNNER_TEMP/mission-control"
          git -C "$RUNNER_TEMP/mission-control" apply --check "$GITHUB_WORKSPACE/patches/mission-control-local-runtimes.patch"
          git -C "$RUNNER_TEMP/mission-control" apply "$GITHUB_WORKSPACE/patches/mission-control-local-runtimes.patch"
          git -C "$RUNNER_TEMP/mission-control" apply --check "$GITHUB_WORKSPACE/patches/mission-control-local-runtime-status.patch"
      - name: Test native app
        run: swift test
      - name: Package native app
        run: ./script/build_and_run.sh --package
      - name: Reject generated or sensitive paths
        run: |
          test ! -e home
          test ! -e runtime
          test ! -e tools
          test ! -e mission-control
          ! git grep -nE 'AUTH_''PASS=[^[:space:]]+|API_''KEY=[^[:space:]]+|/''Users/[^/]+'
      - uses: actions/upload-artifact@v4
        with:
          name: ContinuityPanel-macOS
          path: dist/ContinuityPanel-0.4.2-macos.zip
